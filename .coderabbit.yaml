# CodeRabbit Configuration
# Purpose: Automated code review settings
# Generated by: AIOS-FullStack @github-devops agent

# Overall behavior
reviews:
  enabled: true
  max_files: 150
  max_lines: 5000

# PR reviews
pull_requests:
  enabled: true
  auto_review: true
  review_every_commit: false

# Comment behavior
comments:
  enabled: true
  suppress_no_issues: false

# Path exclusions (files/folders to skip)
paths:
  exclude:
    - '.github/**'
    - '.aios-core/**'
    - 'node_modules/**'
    - 'dist/**'
    - 'build/**'
    - '.next/**'
    - 'coverage/**'
    - '*.min.js'
    - '*.min.css'
    - 'package-lock.json'
    - 'yarn.lock'
    - 'pnpm-lock.yaml'

# Language settings
languages:
  javascript:
    enabled: true
  typescript:
    enabled: true
  json:
    enabled: true
  yaml:
    enabled: true
  markdown:
    enabled: false

# Rules
rules:
  # Security issues = CRITICAL (always block)
  security: critical

  # Performance issues = HIGH (warn)
  performance: high

  # Code quality = MEDIUM (comment)
  quality: medium

  # Style issues = LOW (comment)
  style: low

# Feedback style
feedback:
  tone: professional
  suggestions: true
  explanations: true
